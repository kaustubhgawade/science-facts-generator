<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A simple science fact generator that displays interesting and surprising science facts with a clean modern interface." />
    <title>Science fact generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="loading">
    <div id="loader"></div>
    <main>
      <div id="content">
        <p>Here's your science fact...</p>
        <h1 id="fact">
          Did you know that a teaspoon of a neutron star would weigh about 6
          billion tons? The incredible density comes from protons and electrons
          smashing together to form neutrons under immense gravity.
        </h1>
      </div>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
